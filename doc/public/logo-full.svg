<svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0826"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="accent" x1="50" y1="50" x2="210" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="260" y1="100" x2="740" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <radialGradient id="glow" cx="130" cy="130" r="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="260" rx="44" fill="url(#bg)"/>

  <!-- === Icon mark (centered at 130, 130) === -->

  <!-- Ambient glow -->
  <circle cx="130" cy="130" r="80" fill="url(#glow)"/>

  <!-- Hexagon outline -->
  <polygon
    points="130,64 186,97 186,163 130,196 74,163 74,97"
    fill="none"
    stroke="url(#accent)"
    stroke-width="1.5"
    stroke-opacity="0.2"
    stroke-linejoin="round"/>

  <!-- Spokes -->
  <g stroke="url(#accent)" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.3">
    <line x1="130" y1="130" x2="130" y2="64"/>
    <line x1="130" y1="130" x2="186" y2="97"/>
    <line x1="130" y1="130" x2="186" y2="163"/>
    <line x1="130" y1="130" x2="130" y2="196"/>
    <line x1="130" y1="130" x2="74" y2="163"/>
    <line x1="130" y1="130" x2="74" y2="97"/>
  </g>

  <!-- Extension nodes -->
  <circle cx="130" cy="64" r="9" fill="#818cf8"/>
  <circle cx="186" cy="97" r="9" fill="#8b8ff8"/>
  <circle cx="186" cy="163" r="9" fill="#9b8cf8"/>
  <circle cx="130" cy="196" r="9" fill="#a78bfa"/>
  <circle cx="74" cy="163" r="9" fill="#9b8cf8"/>
  <circle cx="74" cy="97" r="9" fill="#8b8ff8"/>

  <!-- Node highlights -->
  <g fill="white" opacity="0.2">
    <circle cx="128" cy="61" r="3"/>
    <circle cx="184" cy="94" r="3"/>
    <circle cx="184" cy="160" r="3"/>
    <circle cx="128" cy="193" r="3"/>
    <circle cx="72" cy="160" r="3"/>
    <circle cx="72" cy="94" r="3"/>
  </g>

  <!-- Core kernel -->
  <circle cx="130" cy="130" r="19" fill="#e0e7ff"/>
  <circle cx="130" cy="130" r="11" fill="url(#accent)"/>
  <circle cx="128" cy="128" r="3.5" fill="white" opacity="0.35"/>

  <!-- === Wordmark === -->
  <text
    x="260"
    y="148"
    font-family="Inter, SF Pro Display, -apple-system, system-ui, sans-serif"
    font-size="80"
    font-weight="600"
    fill="url(#text-grad)"
    letter-spacing="-2">RenreKit</text>

  <!-- Tagline -->
  <text
    x="264"
    y="186"
    font-family="Inter, SF Pro Display, -apple-system, system-ui, sans-serif"
    font-size="18"
    font-weight="400"
    fill="#818cf8"
    opacity="0.6"
    letter-spacing="4">PLUGIN-DRIVEN CLI</text>
</svg>
