<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0826"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="accent" x1="143" y1="126" x2="369" y2="386" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="256" r="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="160" fill="url(#glow)"/>

  <!-- Hexagon outline connecting extension nodes -->
  <polygon
    points="256,126 369,191 369,321 256,386 143,321 143,191"
    fill="none"
    stroke="url(#accent)"
    stroke-width="2.5"
    stroke-opacity="0.2"
    stroke-linejoin="round"/>

  <!-- Spokes from core to extensions -->
  <g stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-opacity="0.3">
    <line x1="256" y1="256" x2="256" y2="126"/>
    <line x1="256" y1="256" x2="369" y2="191"/>
    <line x1="256" y1="256" x2="369" y2="321"/>
    <line x1="256" y1="256" x2="256" y2="386"/>
    <line x1="256" y1="256" x2="143" y2="321"/>
    <line x1="256" y1="256" x2="143" y2="191"/>
  </g>

  <!-- Extension nodes -->
  <circle cx="256" cy="126" r="18" fill="#818cf8"/>
  <circle cx="369" cy="191" r="18" fill="#8b8ff8"/>
  <circle cx="369" cy="321" r="18" fill="#9b8cf8"/>
  <circle cx="256" cy="386" r="18" fill="#a78bfa"/>
  <circle cx="143" cy="321" r="18" fill="#9b8cf8"/>
  <circle cx="143" cy="191" r="18" fill="#8b8ff8"/>

  <!-- Node highlights -->
  <g fill="white" opacity="0.2">
    <circle cx="253" cy="122" r="6"/>
    <circle cx="366" cy="187" r="6"/>
    <circle cx="366" cy="317" r="6"/>
    <circle cx="253" cy="382" r="6"/>
    <circle cx="140" cy="317" r="6"/>
    <circle cx="140" cy="187" r="6"/>
  </g>

  <!-- Core kernel — outer -->
  <circle cx="256" cy="256" r="38" fill="#e0e7ff"/>
  <!-- Core kernel — inner -->
  <circle cx="256" cy="256" r="22" fill="url(#accent)"/>
  <!-- Core highlight -->
  <circle cx="251" cy="250" r="7" fill="white" opacity="0.35"/>
</svg>
